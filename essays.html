<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essays</title>
    <style>
        body {
            font-family: verdana;
            margin: 15px 0 15px 15px;
            padding: 0;
            background-color: white;
            line-height: 1.4;
            color: #000;
            max-width: 450px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 600px;
            line-height: 1.2;
            margin: 0;
        }
        td {
            padding: 1px 0;
            vertical-align: top;
        }
        .bullet-cell {
            width: 10px;
            padding-right: 2px;
            padding-top: 10px;
        }
        .bullet {
            width: 5px;
            height: 5px;
            background-color: #000;
            margin-top: 0;
        }
        a {
            color: #0000AA;
            cursor: pointer;
            text-decoration: underline;
            font-size: small;
        }
        a:visited {
            color: #000;
        }
        a:hover {
            text-decoration: underline;
        }
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
        }
        .article-content {
            font-size: small;
            line-height: 1.4;
        }
        .back-link {
            display: block;
            margin-top: 30px;
        }
        .footer {
            margin-top: 20px;
            padding: 10px 0;
            font-size: small;
            border-top: 1px solid #eee;
        }
        .error {
            color: red;
            margin-bottom: 10px;
        }
        .loading {
            font-size: small;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Loading essays...</div>
    </div>

    <script>
        const TELEGRAM_CHANNEL = "so_solemn_so_leader";
        const TELEGRAM_URL = `https://t.me/s/${TELEGRAM_CHANNEL}`;

        async function fetchArticles() {
            const response = await fetch(TELEGRAM_URL);
            const html = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");

            const articles = [];
            const messages = doc.querySelectorAll(".tgme_widget_message_text");

            messages.forEach(messageText => {
                const text = messageText.textContent.trim();
                if (!text || text.includes("Channel created")) return;

                const bold = messageText.querySelector("b");
                let header, content;

                if (bold) {
                    header = bold.textContent.trim();
                    // Clone to avoid mutating original
                    const clone = messageText.cloneNode(true);
                    const cloneBold = clone.querySelector("b");
                    if (cloneBold) cloneBold.remove();
                    content = clone.innerHTML.trim();
                } else {
                    header = text.split("\n")[0];
                    content = text;
                }

                // Clean up leading/trailing <br> tags
                content = content.replace(/^(<br\s*\/?>)+/i, "").replace(/(<br\s*\/?>)+$/i, "");

                articles.push({ title: header, content: content });
            });

            return articles;
        }

        function renderList(articles) {
            const app = document.getElementById("app");

            let tableRows = "";
            articles.forEach(article => {
                const encodedTitle = encodeURIComponent(article.title);
                tableRows += `<tr>
                    <td class="bullet-cell"><div class="bullet"></div></td>
                    <td><a href="#" onclick="showArticle('${encodedTitle}'); return false;">${article.title}</a></td>
                </tr>`;
            });

            app.innerHTML = `
                <div class="header">
                    <div class="title">Essays</div>
                </div>
                <table>${tableRows}</table>
                <div class="footer">
                    <a href="https://t.me/${TELEGRAM_CHANNEL}" target="_blank">source</a>
                </div>
            `;
        }

        function renderArticle(article) {
            const app = document.getElementById("app");
            app.innerHTML = `
                <div class="header">
                    <div class="title">${article.title}</div>
                </div>
                <div class="article-content">
                    ${article.content}
                </div>
                <a href="#" class="back-link" onclick="renderList(window._articles); return false;">← Back to articles</a>
            `;
        }

        window.showArticle = function(encodedTitle) {
            const title = decodeURIComponent(encodedTitle);
            const article = window._articles.find(a => a.title === title);
            if (article) {
                renderArticle(article);
                history.pushState({ title: title }, "", `?title=${encodedTitle}`);
            }
        };

        window.addEventListener("popstate", function(event) {
            if (event.state && event.state.title) {
                const article = window._articles.find(a => a.title === event.state.title);
                if (article) {
                    renderArticle(article);
                    return;
                }
            }
            renderList(window._articles);
        });

        // Init
        fetchArticles().then(articles => {
            window._articles = articles;

            // Check if URL has a title parameter
            const params = new URLSearchParams(window.location.search);
            const titleParam = params.get("title");

            if (titleParam) {
                const article = articles.find(a => a.title === titleParam);
                if (article) {
                    renderArticle(article);
                    return;
                }
            }

            renderList(articles);
        }).catch(err => {
            document.getElementById("app").innerHTML = `
                <div class="header">
                    <div class="title">Essays</div>
                </div>
                <div class="error">Failed to load essays. Please try again later.</div>
                <div class="footer">
                    <a href="https://t.me/${TELEGRAM_CHANNEL}" target="_blank">source</a>
                </div>
            `;
        });
    </script>
</body>
</html>
